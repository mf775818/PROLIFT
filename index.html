
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#09090b" />
    <title>ProLift AI 5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- MP4Box.js for fast container remuxing (iOS MOV compatibility) -->
    <script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>

    <!-- OpenCV.js (Industrial Computer Vision) -->
    <script async src="https://docs.opencv.org/4.10.0/opencv.js" onload="try{window.cvDidLoad=true}catch(e){}" type="text/javascript"></script>

    <script>
      // Fallback for missing Global functions referenced by old versions or external scripts
      try {
        if (typeof window.onPageLoaded === 'undefined') {
          Object.defineProperty(window, 'onPageLoaded', {
            value: function() { console.log("ProLift AI: Page Loaded (Legacy Hook)"); },
            writable: true,
            configurable: true
          });
        }
      } catch (e) {
        console.warn("onPageLoaded setup failed:", e);
      }
    </script>

    <style>
      body {
        background-color: #09090b; /* zinc-950 */
        color: #fff;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #18181b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      /* Hide scrollbar for clean mobile UI but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>

{

    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
</head>
